<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShareShot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, "Helvetica Neue",
    "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: #f8fafc; color: #1e293b;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
header {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0; height: 58px;
  display: flex; align-items: center; padding: 0 20px; position: relative;
}
.logo {
  display: flex; align-items: center; gap: 9px;
  font-weight: 700; font-size: 15px; color: #1e293b;
  text-decoration: none; flex-shrink: 0;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.header-divider { width: 1px; height: 20px; background: #e2e8f0; margin: 0 16px; flex-shrink: 0; }
.project-name {
  font-size: 14px; font-weight: 600; color: #0f172a;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 400px; flex: 1;
}
.header-right {
  margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.zoom-ctrl { display: flex; align-items: center; gap: 4px; }
.z-btn {
  width: 30px; height: 30px; background: #f8fafc; border: 1px solid #e2e8f0;
  color: #64748b; border-radius: 7px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; font-family: inherit;
}
.z-btn:hover { background: #f1f5f9; border-color: #cbd5e1; color: #374151; }
#zPct {
  font-size: 12px; color: #64748b; min-width: 42px; text-align: center;
  cursor: pointer; padding: 4px 6px; border-radius: 5px;
  transition: background 0.12s; font-weight: 500;
}
#zPct:hover { background: #f1f5f9; color: #374151; }
.lang-wrap { position: relative; }
.btn-lang {
  display: flex; align-items: center; gap: 4px;
  padding: 0 12px; height: 30px; background: transparent;
  border: 1px solid #e2e8f0; border-radius: 7px;
  font-size: 11px; font-weight: 600; color: #94a3b8;
  cursor: pointer; font-family: inherit; transition: all 0.12s; user-select: none;
}
.btn-lang:hover { background: #f8fafc; border-color: #cbd5e1; color: #64748b; }
.btn-lang svg.chevron { transition: transform 0.15s; }
.btn-lang.open svg.chevron { transform: rotate(180deg); }
.lang-dropdown {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  box-shadow: 0 8px 24px rgba(15,23,42,0.1); overflow: hidden;
  min-width: 130px; z-index: 999; display: none;
}
.lang-dropdown.open { display: block; }
.lang-option {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px; font-size: 13px; font-weight: 500; color: #374151;
  cursor: pointer; transition: background 0.1s; gap: 12px;
}
.lang-option:hover { background: #f8fafc; }
.lang-option.active { color: #6366f1; font-weight: 600; }
.lang-option .check { opacity: 0; color: #6366f1; }
.lang-option.active .check { opacity: 1; }
.btn-back {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 32px; background: transparent;
  border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; font-weight: 500; color: #64748b;
  cursor: pointer; text-decoration: none; transition: all 0.12s; font-family: inherit;
}
.btn-back:hover { background: #f8fafc; border-color: #cbd5e1; color: #374151; }

#stage {
  flex: 1; position: relative; overflow: hidden;
  background-color: #f1f5f9;
  background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
  background-size: 24px 24px; cursor: grab;
}
#stage.panning { cursor: grabbing; }
#imgWrap { position: absolute; transform-origin: top left; }
#imgWrap img {
  display: block; max-width: none; user-select: none;
  border-radius: 6px;
  box-shadow: 0 4px 24px rgba(15,23,42,0.12), 0 1px 4px rgba(15,23,42,0.06);
}
.state-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; text-align: center; padding: 24px;
}
.state-icon { font-size: 40px; margin-bottom: 4px; }
.state-title { font-size: 17px; font-weight: 600; color: #64748b; }
.state-sub { font-size: 13px; color: #94a3b8; max-width: 300px; line-height: 1.5; }
.spinner {
  width: 24px; height: 24px; border: 2px solid #e2e8f0;
  border-top-color: #6366f1; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">📸</div>
    ShareShot
  </a>
  <div class="header-divider"></div>
  <div class="project-name" id="projectName" data-i18n="loading">Loading...</div>
  <div class="header-right">
    <div class="zoom-ctrl">
      <button class="z-btn" id="zOut">−</button>
      <div id="zPct">100%</div>
      <button class="z-btn" id="zIn">+</button>
      <button class="z-btn" id="zFit" data-tip="Fit (F)">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M1 3.5V1h2.5M8.5 1H11v2.5M11 8.5V11H8.5M3.5 11H1V8.5"/>
        </svg>
      </button>
    </div>
    <div class="lang-wrap">
      <button class="btn-lang" id="langBtn">
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="6.5" cy="6.5" r="5"/><path d="M6.5 1.5c-1.5 2-1.5 8 0 10M6.5 1.5c1.5 2 1.5 8 0 10M1.5 6.5h10"/>
        </svg>
        Language
        <svg class="chevron" width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,3.5 5,6.5 8,3.5"/></svg>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <div class="lang-option" data-lang="en"><span>English</span><span class="check">✓</span></div>
        <div class="lang-option" data-lang="ja"><span>日本語</span><span class="check">✓</span></div>
      </div>
    </div>
    <a class="btn-back" href="/" id="backBtn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2.5L3.5 6.5L8 10.5"/>
      </svg>
      <span data-i18n="allProjects">All Projects</span>
    </a>
  </div>
</header>

<div id="stage">
  <div class="state-wrap" id="loadingState">
    <div class="spinner"></div>
  </div>
  <div id="imgWrap" style="display:none">
    <img id="mainImg" src="" alt="Screenshot">
  </div>
</div>

<script>
'use strict';

const STRINGS = {
  en: {
    loading:'Loading...', allProjects:'All Projects',
    noImage:'No shared image', noImageSub:'This project has no shared image yet.',
    loadFail:'Failed to load image', loadFailSub:'Please try again.',
    notFound:'Page not found', notFoundSub:'Please check that the link is correct.',
    accessDenied:'Access denied', accessDeniedSub:'This link may have been revoked or is invalid.',
  },
  ja: {
    loading:'読み込み中...', allProjects:'プロジェクト一覧',
    noImage:'共有された画像がありません', noImageSub:'このプロジェクトにはまだ共有画像がありません。',
    loadFail:'画像を読み込めませんでした', loadFailSub:'もう一度お試しください。',
    notFound:'ページが見つかりません', notFoundSub:'リンクが正しいかご確認ください。',
    accessDenied:'アクセス拒否', accessDeniedSub:'このリンクは無効か、削除された可能性があります。',
  },
};

let lang = localStorage.getItem('shareshot-lang') || 'en';
function t(k) { return STRINGS[lang][k] || STRINGS.en[k] || k; }

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('.lang-option').forEach(o => o.classList.toggle('active', o.dataset.lang === lang));
  document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  localStorage.setItem('shareshot-lang', lang);
}

const langBtn = document.getElementById('langBtn');
const langDropdown = document.getElementById('langDropdown');
langBtn.addEventListener('click', e => { e.stopPropagation(); langBtn.classList.toggle('open'); langDropdown.classList.toggle('open'); });
document.addEventListener('click', () => { langBtn.classList.remove('open'); langDropdown.classList.remove('open'); });
document.querySelectorAll('.lang-option').forEach(opt => {
  opt.addEventListener('click', () => {
    lang = opt.dataset.lang;
    langBtn.classList.remove('open'); langDropdown.classList.remove('open');
    applyLang();
  });
});

const projectId  = location.pathname.split('/').pop();
const shareToken = new URLSearchParams(location.search).get('token');
let zoom = 1, panX = 0, panY = 0;
let isPanning = false, startX, startY, startPanX, startPanY;

async function load() {
  try {
    const apiUrl = shareToken
      ? `/api/projects/${projectId}?token=${encodeURIComponent(shareToken)}`
      : `/api/projects/${projectId}`;
    const res = await fetch(apiUrl);
    if (res.status === 403) { showState('🔒', t('accessDenied'), t('accessDeniedSub')); return; }
    if (!res.ok)            { showState('🔍', t('notFound'), t('notFoundSub'));          return; }
    const proj = await res.json();

    document.title = `${proj.title} — ShareShot`;
    document.getElementById('projectName').textContent = proj.title;
    document.getElementById('projectName').removeAttribute('data-i18n');

    if (!proj.sharedImageId) { showState('📭', t('noImage'), t('noImageSub')); return; }

    const img = document.getElementById('mainImg');
    img.src = `/images/${proj.sharedImageId}.png`;
    img.onload = () => {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('imgWrap').style.display = 'block';
      fitImage(); bindInteraction();
    };
    img.onerror = () => showState('⚠️', t('loadFail'), t('loadFailSub'));
  } catch (e) {
    showState('🔍', t('notFound'), t('notFoundSub'));
  }
}

function showState(icon, title, sub) {
  const el = document.getElementById('loadingState');
  el.style.display = 'flex';
  el.innerHTML = `<div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-sub">${sub}</div>`;
}

function applyTransform(animated = false) {
  const wrap = document.getElementById('imgWrap');
  wrap.style.transition = animated ? 'transform 0.18s ease' : 'none';
  wrap.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  document.getElementById('zPct').textContent = Math.round(zoom * 100) + '%';
  document.getElementById('stage').style.backgroundPosition = `${panX % 24}px ${panY % 24}px`;
}

function fitImage() {
  const stage = document.getElementById('stage'), img = document.getElementById('mainImg');
  const pad = 48, sw = stage.clientWidth - pad*2, sh = stage.clientHeight - pad*2;
  zoom = Math.min(1, sw / img.naturalWidth, sh / img.naturalHeight);
  panX = (stage.clientWidth - img.naturalWidth * zoom) / 2;
  panY = (stage.clientHeight - img.naturalHeight * zoom) / 2;
  applyTransform(false);
}

function changeZoom(factor, cx, cy) {
  const stage = document.getElementById('stage');
  cx ??= stage.clientWidth / 2; cy ??= stage.clientHeight / 2;
  const newZoom = Math.min(Math.max(zoom * factor, 0.05), 10);
  panX = cx - (cx - panX) * (newZoom / zoom);
  panY = cy - (cy - panY) * (newZoom / zoom);
  zoom = newZoom; applyTransform(false);
}

function bindInteraction() {
  const stage = document.getElementById('stage');
  stage.addEventListener('wheel', e => { e.preventDefault(); changeZoom(0.999 ** e.deltaY, e.offsetX, e.offsetY); }, { passive: false });
  stage.addEventListener('mousedown', e => {
    isPanning = true; startX = e.clientX; startY = e.clientY; startPanX = panX; startPanY = panY;
    stage.classList.add('panning');
  });
  document.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = startPanX + (e.clientX - startX); panY = startPanY + (e.clientY - startY);
    applyTransform(false);
  });
  document.addEventListener('mouseup', () => { isPanning = false; document.getElementById('stage').classList.remove('panning'); });

  let lastTouchDist = 0;
  stage.addEventListener('touchstart', e => {
    if (e.touches.length === 2) lastTouchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    else if (e.touches.length === 1) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; startPanX = panX; startPanY = panY; }
  }, { passive: true });
  stage.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      if (lastTouchDist) changeZoom(d / lastTouchDist); lastTouchDist = d;
    } else if (e.touches.length === 1) {
      panX = startPanX + (e.touches[0].clientX - startX); panY = startPanY + (e.touches[0].clientY - startY); applyTransform(false);
    }
  }, { passive: false });
  stage.addEventListener('touchend', () => { lastTouchDist = 0; });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'f' || e.key === 'F' || e.key === '0') fitImage();
    if (e.key === '+' || e.key === '=') changeZoom(1.25);
    if (e.key === '-') changeZoom(0.8);
  });
}

document.getElementById('zIn').addEventListener('click', () => changeZoom(1.25));
document.getElementById('zOut').addEventListener('click', () => changeZoom(0.8));
document.getElementById('zFit').addEventListener('click', fitImage);
document.getElementById('zPct').addEventListener('click', fitImage);
window.addEventListener('resize', fitImage);

applyLang();
load();
</script>
</body>
</html>
